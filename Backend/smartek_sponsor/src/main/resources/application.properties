# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/training_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration - update means Hibernate will create/update tables as needed
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Server Configuration
server.port=8082

# Application Name (for Eureka)
spring.application.name=sponsor-service

# Show detailed error messages
server.error.include-message=always
server.error.include-binding-errors=always

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Admin Email (for notifications)
admin.email=admin@smartek.com

# Auth Service URL
auth.service.url=http://localhost:8081

# Eureka Client Configuration (commented out for now, enable when ready)
