<aside class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 block w-full -translate-x-full flex-col items-center justify-between border-0 bg-white p-0 antialiased shadow-2xl transition-transform duration-200 xl:left-0 xl:translate-x-0 flex overflow-hidden">
  <!-- Logo Header -->
  <div class="h-19.5 flex-shrink-0 w-full pt-6 pb-4">
    <a class="block px-6 m-0 text-sm whitespace-nowrap" href="/dashboard">
      <div class="flex items-center space-x-3 animate-fade-in">
        <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-blue-600 rounded-2xl flex items-center justify-center shadow-lg">
          <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10.394 2.08a1 1 0 00-.788 0l-7 3a1 1 0 000 1.84L5.25 8.051a.999.999 0 01.356-.257l4-1.714a1 1 0 11.788 1.838L7.667 9.088l1.94.831a1 1 0 00.787 0l7-3a1 1 0 000-1.838l-7-3zM3.31 9.397L5 10.12v4.102a8.969 8.969 0 00-1.05-.174 1 1 0 01-.89-.89 11.115 11.115 0 01.25-3.762zM9.3 16.573A9.026 9.026 0 007 14.935v-3.957l1.818.78a3 3 0 002.364 0l5.508-2.361a11.026 11.026 0 01.25 3.762 1 1 0 01-.89.89 8.968 8.968 0 00-5.35 2.524 1 1 0 01-1.4 0zM6 18a1 1 0 001-1v-2.065a8.935 8.935 0 00-2-.712V17a1 1 0 001 1z"/>
          </svg>
        </div>
        <div>
          <span class="font-bold text-xl text-gray-800">SMARTEK</span>
          <p class="text-xs text-gray-500">Admin Panel</p>
        </div>
      </div>
    </a>
  </div>

  <!-- Real-time Notification Badges Section (Only show if there are actual pending approvals) -->
  <div class="w-full px-4 pb-3">
    <!-- Admin: Pending Approvals Badge -->
    <div *ngIf="isAdmin() && pendingApprovalsCount > 0" class="mb-3 animate-slide-in-right">
      <a routerLink="/dashboard/admin-approvals" 
         [routerLinkActive]="[]"
         class="block bg-gradient-to-r from-orange-500 to-red-500 rounded-2xl p-4 shadow-lg hover:shadow-xl transition-all duration-300 transform hover:scale-[1.02]"
         style="color: white !important; text-decoration: none !important;">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
              <span class="material-icons text-xl" style="color: white !important;">notifications_active</span>
            </div>
            <span class="text-sm font-semibold" style="color: white !important;">Pending Approvals</span>
          </div>
          <span class="bg-white text-red-600 rounded-full px-3 py-1 text-xs font-bold animate-pulse-slow shadow-md">{{ pendingApprovalsCount }}</span>
        </div>
      </a>
    </div>
  </div>

  <!-- Menu Items -->
  <div class="flex-1 w-full overflow-y-auto">
    <ul class="flex flex-col pl-0 mb-0 space-y-1.5 px-4">
      <ng-container *ngFor="let item of menuItems; let i = index">
        <!-- Divider -->
        <li *ngIf="item.divider" class="w-full my-2">
          <hr class="border-gray-200">
        </li>

        <!-- Header -->
        <li *ngIf="item.header" class="w-full mt-6">
          <h6 class="pl-3 text-xs font-bold leading-tight uppercase text-gray-400 tracking-wider">{{ item.header }}</h6>
        </li>

        <!-- Menu Item with staggered animation -->
        <li *ngIf="!item.divider && !item.header" class="w-full animate-fade-in" [style.animation-delay]="(i * 50) + 'ms'">
          <a 
            [routerLink]="[item.route]" 
            routerLinkActive="bg-gradient-to-r from-orange-500 to-blue-600 text-white shadow-lg" 
            [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
            class="py-3.5 text-sm ease-nav-brand flex items-center whitespace-nowrap rounded-xl px-4 font-medium text-gray-600 transition-all duration-300 hover:bg-gray-50 hover:text-gray-900 group relative overflow-hidden">
            <div class="mr-3 flex h-9 w-9 items-center justify-center rounded-lg transition-all">
              <span class="material-icons text-xl group-[.bg-gradient-to-r]:text-white">{{ item.icon }}</span>
            </div>
            <span class="duration-300 opacity-100 pointer-events-none ease-soft">{{ item.label }}</span>
          </a>
        </li>
      </ng-container>
    </ul>
  </div>
</aside>
